name: kimi_remote
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # WebSocket
  web_socket_channel: ^2.4.0
  
  # 状态管理
  flutter_bloc: ^8.1.3
  
  # 本地存储
  shared_preferences: ^2.2.2
  
  # 通知
  flutter_local_notifications: ^16.1.0
  
  # HTTP 请求
  dio: ^5.4.0
  
  # JSON 序列化
  json_annotation: ^4.8.1
  freezed_annotation: ^2.4.1
  
  # UI
  cupertino_icons: ^1.0.6
  flutter_markdown: ^0.6.18
  
  # 工具
  uuid: ^4.2.1
  intl: ^0.18.1
  
  # Firebase (离线推送)
  firebase_core: ^2.24.2
  firebase_messaging: ^14.7.10

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.7
  json_serializable: ^6.7.1
  freezed: ^2.4.5

flutter:
  uses-material-design: true
